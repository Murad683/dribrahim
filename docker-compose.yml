version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: dribrahim-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dribrahim_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5433:5432"
    volumes:
      - dribrahim_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d dribrahim_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: dribrahim-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: dribrahim_db
      DB_USERNAME: admin
      DB_PASSWORD: password123
      JWT_SECRET: ${JWT_SECRET:-dribrahim-super-secret-key-please-change-in-production-2026}
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: dribrahim-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  dribrahim_postgres_data:
